name: 🧪 CI — Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  WORKING_DIR: ./backend

jobs:
  # ─── Job 1: Lint ────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: |
          # Check if eslint config exists, if not skip
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f ".eslintrc.yml" ]; then
            npm run lint
          else
            echo "No ESLint config found, skipping lint step"
          fi

  # ─── Job 2: Test ────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies (including devDependencies)
        run: npm ci

      - name: 🧪 Run Jest Tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci_only

      - name: 📊 Generate Coverage Report
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci_only

      - name: 📤 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ─── Job 3: Docker Build Smoke Test ─────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: devflow-backend:ci-test
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔨 Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nginx
          push: false
          tags: devflow-frontend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Images built successfully
        run: |
          docker images | grep devflow || true
          echo "✅ All Docker images built successfully!"
