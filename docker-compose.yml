version: '3.9'

services:
  # ─── MongoDB Database ────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: devflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: devflow
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - devflow-network
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Node.js Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: devflow-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/devflow
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - devflow-network
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── nginx Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: devflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devflow-network
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# ─── Networks & Volumes ───────────────────────────────────────────────
networks:
  devflow-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
